<style>
  :root{ --cyan:#6ef5e8; --gold:#ffd87a; --ink:rgba(5,10,24,0.62); --line:rgba(110,245,232,0.22); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#020510;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif; }
  #app{ position:fixed; inset:0; }
  canvas{ display:block; }

  #hud{
    position:fixed; top:14px; left:14px; z-index:20; pointer-events:none; user-select:none;
    color:#e6f7ff; font-size:12px; line-height:1.75; min-width:208px;
    padding:14px 16px 12px; border-radius:4px;
    background:var(--ink); border:1px solid var(--line); border-left:2px solid var(--cyan);

  #hud .t{ font-size:10px; letter-spacing:4px; color:var(--cyan); margin-bottom:8px; text-transform:uppercase; opacity:.9; }
  #hud .r{ display:flex; justify-content:space-between; gap:16px; }
  #hud .k{ opacity:.62; letter-spacing:1px; }
  #hud .v{ font-weight:700; font-variant-numeric:tabular-nums; }
  #hud .gold{ color:var(--gold); }
  #hud .bar{ height:4px; margin:7px 0 4px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
  #hud .bar i{ display:block; height:100%; width:0;
    background:linear-gradient(90deg,var(--cyan),var(--gold)); box-shadow:0 0 12px rgba(110,245,232,.7); transition:width .25s linear; }
  #hud .finale-now{ color:#ff8c9e; animation:pulse .8s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }

  #hint{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:20;
    pointer-events:none; user-select:none; color:rgba(214,240,255,.5); font-size:11px; letter-spacing:2px;
    text-shadow:0 1px 6px rgba(0,10,40,.8); }

  #overlay{ position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center;
    text-align:center; padding:24px; background:radial-gradient(ellipse at 50% 40%, #0a1430, #020510); color:#d7ecff; }
  #overlay .bx{ max-width:560px; padding:30px 34px; border-radius:6px;
    background:rgba(8,16,38,.8); border:1px solid var(--line); border-left:2px solid var(--cyan); }
  #overlay h1{ font-size:17px; letter-spacing:3px; color:var(--cyan); margin-bottom:14px; }
  #overlay p{ font-size:13px; line-height:1.9; opacity:.92; }

  /* lil-gui を右上に固定 */
  .lil-gui.root{ --width:300px; z-index:30; top:12px; right:12px; }
</style>

<script type="module">
import * as THREE from 'three';
import GUI from 'lil-gui';

/* ============================================================================
   NIGHT TIDE v3 (three.js r185 / ESM)
   主な変更：
     - r185 移行（ESM + importmap、UMDグローバル/updateRange など廃止APIを排除）
     - 花火の粒を「火の玉」化（白熱コア + グロー）。GUIで粒サイズ可変
     - 燃える火薬の表現：寿命に沿う黒体冷却(白→橙→赤) + 高周波フリッカー
     - カメラを上向きに調整し、海は画面下 約1/4 に圧縮（空と花火を主役に）
   ============================================================================ */

function fatal(t,m){
  const o=document.getElementById('overlay');
  document.getElementById('ovT').textContent=t;
  document.getElementById('ovM').innerHTML=m;
  o.style.display='flex';
}

/* ---------- ユーティリティ ---------- */
const TAU=Math.PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);
const randi=(a,b)=>(a+Math.random()*(b-a+1))|0;
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
const pick=a=>a[(Math.random()*a.length)|0];
function hsv(h,s,v){
  h=(h%1+1)%1; const i=(h*6)|0,f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
  switch(i%6){case 0:return[v,t,p];case 1:return[q,v,p];case 2:return[p,v,t];
              case 3:return[p,q,v];case 4:return[t,p,v];default:return[v,p,q];}
}
/* 黒体っぽい冷却ランプ：lr=1(高温・白黄) → 0(低温・暗赤) */
function ember(lr,out){
  let r,g,b;
  if(lr>0.62){ const t=(lr-0.62)/0.38; r=1; g=lerp(.66,.96,t); b=lerp(.28,.72,t); }
  else if(lr>0.32){ const t=(lr-0.32)/0.30; r=lerp(.96,1,t); g=lerp(.34,.66,t); b=lerp(.07,.28,t); }
  else { const t=lr/0.32; r=lerp(.42,.96,t); g=lerp(.06,.34,t); b=lerp(.02,.07,t); }
  out[0]=r; out[1]=g; out[2]=b;
}

/* GLSL：値ノイズ + fbm（全シェーダ共通） */
const G_NOISE=`
float hash21(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float vnoise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.-2.*f);
  float a=hash21(i),b=hash21(i+vec2(1,0)),c=hash21(i+vec2(0,1)),d=hash21(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y); }
float fbm(vec2 p){ float v=0.,a=.5; for(int k=0;k<4;k++){ v+=a*vnoise(p); p*=2.03; a*=.5;} return v; }
`;

/* ============================================================================
   状態（GUI が直接編集）
   ============================================================================ */
const P={
  weather:'Clear',
  moonPhase:'Full', moonHeight:0.74, moonAzimuth:0.18, moonBrightness:1.0,
  starDensity:1.0,
  waveStrength:1.0, waveSpeed:1.0,
  noctDensity:1.0, noctBrightness:1.0, noctTrail:true,
  program:'長岡風', fwIntensity:1.0, fwSize:1.0, fwHeight:1.0, fwParticle:1.3, sparkle:1.0,
  trail:true, trailPersist:0.92,   // ★線が残る（長秒露光風）/ 軌跡の長さ
  windDirection:0.15, windStrength:0.4,
  bloom:1.1,
  sound:true, volume:0.8, whistle:true,   // ★効果音 ON/OFF・音量・打ち上げ笛
  autoFinale:true, paused:false,
  quality:'Auto'
};

const WEATHERS=['Clear','Light Clouds','Heavy Clouds','Misty','Windy','Rain','After Rain','Hot Humid Night','Typhoon Afterglow'];
const PROGRAMS_LIST=['長岡風','大曲風','隅田川風','土浦風','片貝風','諏訪湖風','カラフル連発','フィナーレ連発'];

const WX={
  'Clear':            {top:[.012,.03,.10], hor:[.05,.09,.24], cloud:.04, cspd:.35, fog:.05, star:1.0,  moon:1.0, rain:0,   wave:.9,  wind:.5,  noct:1.0, smoke:.5},
  'Light Clouds':     {top:[.02,.04,.11],  hor:[.07,.10,.25], cloud:.30, cspd:.55, fog:.09, star:.65,  moon:.88, rain:0,   wave:1.0, wind:.6,  noct:1.0, smoke:.6},
  'Heavy Clouds':     {top:[.03,.045,.09], hor:[.08,.09,.18], cloud:.78, cspd:.7,  fog:.17, star:.22,  moon:.5,  rain:0,   wave:1.1, wind:.7,  noct:.9,  smoke:.7},
  'Misty':            {top:[.045,.06,.13], hor:[.11,.13,.24], cloud:.32, cspd:.3,  fog:.42, star:.45,  moon:.78, rain:0,   wave:.8,  wind:.4,  noct:1.1, smoke:.4},
  'Windy':            {top:[.015,.04,.12], hor:[.06,.10,.26], cloud:.42, cspd:1.9, fog:.09, star:.8,   moon:.95, rain:0,   wave:1.7, wind:1.7, noct:1.2, smoke:1.6},
  'Rain':             {top:[.025,.04,.085],hor:[.06,.08,.16], cloud:.85, cspd:1.0, fog:.30, star:.08,  moon:.42, rain:1.0, wave:1.3, wind:1.0, noct:.8,  smoke:.9},
  'After Rain':       {top:[.008,.03,.115],hor:[.04,.09,.27], cloud:.12, cspd:.5,  fog:.06, star:1.15, moon:1.0, rain:0,   wave:1.0, wind:.6,  noct:1.0, smoke:.5},
  'Hot Humid Night':  {top:[.04,.05,.12],  hor:[.12,.11,.22], cloud:.24, cspd:.4,  fog:.36, star:.55,  moon:.82, rain:0,   wave:.8,  wind:.5,  noct:1.55,smoke:.4},
  'Typhoon Afterglow':{top:[.025,.04,.10], hor:[.07,.09,.20], cloud:.68, cspd:2.8, fog:.15, star:.45,  moon:.66, rain:.18, wave:2.1, wind:2.1, noct:1.3, smoke:2.2}
};
const PRG={
  '長岡風':        {types:['willow','nishiki','peony','large','silver'],    rate:1.0, big:1.65, spread:1.25},
  '大曲風':        {types:['chrys','peony','saturn','large','senrin'],      rate:1.1, big:1.30, spread:0.80},
  '隅田川風':      {types:['peony','chrys','colorful','heart','smile'],     rate:1.45,big:1.00, spread:1.45},
  '土浦風':        {types:['starmine','colorful','peony','smile','senrin'], rate:2.1, big:0.92, spread:1.65},
  '片貝風':        {types:['large','large','willow','chrys','nishiki'],     rate:0.6, big:2.30, spread:0.70},
  '諏訪湖風':      {types:['willow','niagara','peony','chrys','silver'],    rate:1.25,big:1.40, spread:1.00},
  'カラフル連発':  {types:['colorful','peony','butterfly','smile','fuji','heart'], rate:2.3, big:0.85, spread:1.75},
  'フィナーレ連発':{types:['starmine','colorful','large','willow','nishiki'],rate:3.2, big:1.45, spread:1.85}
};

/* ============================================================================
   App
   ============================================================================ */
class App{
  constructor(){
    this.timer=new THREE.Timer();   // r185でClockは非推奨のためTimerを使用
    this.fps=60; this.finaleIn=55; this.finale=false; this.finaleLeft=0;
    this.isMobile=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)||Math.min(innerWidth,innerHeight)<560;
    this.resolveQuality();

    this.renderer=new THREE.WebGLRenderer({antialias:!this.isMobile, powerPreference:'high-performance'});
    this.renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    this.renderer.setSize(innerWidth,innerHeight);
    this.renderer.setClearColor(0x020510,1);
    document.getElementById('app').appendChild(this.renderer.domElement);

    this.scene=new THREE.Scene();
    this.fwScene=new THREE.Scene();   // ★花火だけ別シーン（トレイル蓄積バッファ用）
    this.camera=new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.5, 8000);
    /* ★海を画面下1/4に。光跡(長秒露光風)を崩さないため三脚固定＝カメラは静止 */
    this.lookAtY=255; this.lookAtZ=-380;   // ★海:空≒5:95（水平線を画面下〜94%へ）
    this.camera.position.set(0,12,120);
    this.camera.lookAt(0,this.lookAtY,this.lookAtZ);

    this.sky=new SkySystem(this);
    this.moon=new MoonSystem(this);
    this.ocean=new OceanSystem(this);
    this.shore=new ShorelineSystem(this);
    this.noct=new NoctilucaSystem(this);
    this.weather=new WeatherSystem(this);
    this.reflect=new ReflectionSystem(this);
    this.fw=new FireworksSystem(this);
    this.sound=new SoundSystem(this);
    this.hud=new HUDSystem(this);
    this.gui=new GUIController(this);
    this.initTrails();

    addEventListener('resize',()=>this.onResize());
    this.renderer.domElement.addEventListener('pointerdown',e=>{
      this.sound.unlock();   // ブラウザの自動再生制限：操作で音声を有効化
      this.fw.manual((e.clientX/innerWidth)*2-1);
    });

    this.loop=this.loop.bind(this);
    requestAnimationFrame(this.loop);
  }
  resolveQuality(){
    let q=P.quality; if(q==='Auto') q=this.isMobile?'Low':'High'; this.q=q;
    if(q==='High'){ this.poolN=10000; this.shellMax=30; this.seaSeg=190; this.starN=2800; this.noctN=3400; this.pScale=1.0; }
    else if(q==='Mid'){ this.poolN=5600; this.shellMax=18; this.seaSeg=130; this.starN=1800; this.noctN=2000; this.pScale=0.6; }
    else { this.poolN=2800; this.shellMax=10; this.seaSeg=84; this.starN=1100; this.noctN=1100; this.pScale=0.34; }
  }

  /* ★長秒露光風トレイル：花火レイヤーをping-pongで減衰加算し、線として残す */
  initTrails(){
    const dr=this.renderer.getDrawingBufferSize(new THREE.Vector2());
    const opt={ depthBuffer:false, stencilBuffer:false, magFilter:THREE.LinearFilter, minFilter:THREE.LinearFilter };
    this.rtA=new THREE.WebGLRenderTarget(dr.x,dr.y,opt);
    this.rtB=new THREE.WebGLRenderTarget(dr.x,dr.y,opt);
    this.orthoCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
    const quadVS=`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.,1.);} `;
    // 減衰パス：前トレイル×decay（微小値は切り捨てて残像を完全に消す）
    this.fadeMat=new THREE.ShaderMaterial({ depthTest:false, depthWrite:false,
      uniforms:{ tDiffuse:{value:null}, uDecay:{value:0.92} }, vertexShader:quadVS,
      fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uDecay;
        void main(){ vec3 c=texture2D(tDiffuse,vUv).rgb*uDecay; c=max(c-0.004,0.0); gl_FragColor=vec4(c,1.0);} ` });
    this.fadeScene=new THREE.Scene(); this.fadeScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),this.fadeMat));
    // 合成パス：トレイルを画面へ加算
    this.compMat=new THREE.ShaderMaterial({ transparent:true, blending:THREE.AdditiveBlending, depthTest:false, depthWrite:false,
      uniforms:{ tDiffuse:{value:null} }, vertexShader:quadVS,
      fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; void main(){ gl_FragColor=vec4(texture2D(tDiffuse,vUv).rgb,1.0);} ` });
    this.compScene=new THREE.Scene(); this.compScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),this.compMat));
  }

  onResize(){
    this.camera.aspect=innerWidth/innerHeight; this.camera.updateProjectionMatrix();
    this.renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    this.renderer.setSize(innerWidth,innerHeight);
    const dr=this.renderer.getDrawingBufferSize(new THREE.Vector2());
    if(this.rtA){ this.rtA.setSize(dr.x,dr.y); this.rtB.setSize(dr.x,dr.y); }
  }
  startFinale(){ this.finale=true; this.finaleLeft=10; }
  loop(){
    requestAnimationFrame(this.loop);
    this.timer.update();                              // 経過時間とdeltaを更新
    let dt=Math.min(this.timer.getDelta(),0.05); const t=this.timer.getElapsed();
    this.fps=lerp(this.fps, dt>0?1/dt:60, .08);
    if(!P.paused){
      if(P.autoFinale && !this.finale){ this.finaleIn-=dt; if(this.finaleIn<=0) this.startFinale(); }
      if(this.finale){ this.finaleLeft-=dt; if(this.finaleLeft<=0){ this.finale=false; this.finaleIn=rand(50,80); } }

      this.weather.update(dt,t);
      this.sky.update(dt,t);
      this.moon.update(t);
      const hit=this.shore.update(dt,t);
      this.noct.update(dt,t,hit);
      this.fw.update(dt,t,this.finale);
      this.reflect.flush();
      this.ocean.update(dt,t);
    }
    this.hud.update();
    this.renderFrame();
  }

  /* 描画：本シーン → 花火トレイル蓄積 → 加算合成 */
  renderFrame(){
    const r=this.renderer;
    r.autoClear=false;
    // 1) 本シーン（花火以外）を画面へ
    r.setRenderTarget(null); r.clear(); r.render(this.scene,this.camera);
    if(P.trail){
      // 2) 前トレイルを減衰させて rtB を満たす
      r.setRenderTarget(this.rtB); r.clear();
      this.fadeMat.uniforms.tDiffuse.value=this.rtA.texture;
      this.fadeMat.uniforms.uDecay.value=P.trailPersist;
      r.render(this.fadeScene,this.orthoCam);
      // 3) 花火を rtB へ加算（クリアしない＝軌跡が線として蓄積）
      r.render(this.fwScene,this.camera);
      // 4) rtB を画面へ加算合成（クリアしない＝本シーンを保持）
      this.compMat.uniforms.tDiffuse.value=this.rtB.texture;
      r.setRenderTarget(null); r.render(this.compScene,this.orthoCam);
      const t=this.rtA; this.rtA=this.rtB; this.rtB=t;   // ping-pong入れ替え
    }else{
      // トレイル無効：花火を直接重ねる
      r.setRenderTarget(null); r.render(this.fwScene,this.camera);
    }
  }
}

/* ============================================================================
   SkySystem
   ============================================================================ */
class SkySystem{
  constructor(app){
    this.app=app;
    this.u={ uTop:{value:new THREE.Color()}, uHor:{value:new THREE.Color()}, uHaze:{value:.1}, uTime:{value:0} };
    const dome=new THREE.Mesh(new THREE.SphereGeometry(3400,28,20), new THREE.ShaderMaterial({
      side:THREE.BackSide, depthWrite:false, uniforms:this.u,
      vertexShader:`varying vec3 vD; void main(){ vD=normalize(position);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);} `,
      fragmentShader:`${G_NOISE}
        varying vec3 vD; uniform vec3 uTop,uHor; uniform float uHaze,uTime;
        void main(){ float h=clamp(vD.y*.5+.5,0.,1.);
          vec3 c=mix(uHor,uTop,pow(h,.65));
          float band=smoothstep(.56,.42,h); float n=fbm(vD.xz*4.+uTime*.01);
          c+=vec3(.10,.12,.20)*band*uHaze*(2.2+n);
          gl_FragColor=vec4(c,1.);}`
    }));
    app.scene.add(dome);
    this.buildStars(); this.buildConstellations();
    this.meteors=[]; this.meteorT=rand(2,5);
  }
  buildStars(){
    const N=this.app.starN;
    const pos=new Float32Array(N*3),ph=new Float32Array(N),br=new Float32Array(N),hue=new Float32Array(N);
    for(let i=0;i<N;i++){ const th=Math.random()*TAU,phi=Math.acos(1-Math.random()*.62),r=2900;
      pos[i*3]=r*Math.sin(phi)*Math.cos(th); pos[i*3+1]=r*Math.cos(phi)*.92+50; pos[i*3+2]=r*Math.sin(phi)*Math.sin(th);
      ph[i]=Math.random()*TAU; br[i]=Math.pow(Math.random(),1.6)*.9+.15; hue[i]=Math.random(); }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    g.setAttribute('aP',new THREE.BufferAttribute(ph,1));
    g.setAttribute('aB',new THREE.BufferAttribute(br,1));
    g.setAttribute('aH',new THREE.BufferAttribute(hue,1));
    this.su={ uTime:{value:0}, uDen:{value:1}, uPix:{value:Math.min(devicePixelRatio||1,2)} };
    this.stars=new THREE.Points(g,new THREE.ShaderMaterial({
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, uniforms:this.su,
      vertexShader:`attribute float aP,aB,aH; uniform float uTime,uDen,uPix; varying float vA; varying vec3 vC;
        void main(){ float tw=.55+.45*sin(uTime*1.8+aP); vA=aB*tw*uDen;
          vC=mix(vec3(.75,.85,1.),vec3(1.,.92,.78),step(.8,aH));
          vec4 mv=modelViewMatrix*vec4(position,1.); gl_Position=projectionMatrix*mv;
          gl_PointSize=(aB*2.8+.7)*uPix; }`,
      fragmentShader:`varying float vA; varying vec3 vC;

      vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`${G_NOISE}
        varying vec2 vUv; uniform float uPhase,uBr;
        void main(){ vec2 p=vUv*2.-1.; float r=length(p); if(r>1.) discard;
          float n=fbm(p*4.)*.5+fbm(p*9.+3.7)*.3;
          float cr=0.; cr+=smoothstep(.16,.04,length(p-vec2(.32,.18)))*.25;
          cr+=smoothstep(.12,.03,length(p-vec2(-.25,-.3)))*.2; cr+=smoothstep(.1,.02,length(p-vec2(-.1,.42)))*.15;

      transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,

      vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`varying vec2 vUv; uniform float uBr,uA,uPw;
        void main(){ float r=length(vUv*2.-1.); float a=pow(smoothstep(1.,0.,r),uPw);
          gl_FragColor=vec4(vec3(.72,.8,1.),a*uA*uBr);}`

const RMAX=10;
class OceanSystem{
  constructor(app){
    this.app=app;
    const g=new THREE.PlaneGeometry(8000,5200,app.seaSeg,app.seaSeg); g.rotateX(-Math.PI/2);
    const rp=[],rc=[]; for(let i=0;i<RMAX;i++){rp.push(new THREE.Vector3());rc.push(new THREE.Color());}
    this.u={ uTime:{value:0}, uStr:{value:1}, uSpd:{value:1}, uWind:{value:0},
      uMoonX:{value:0}, uMoonBr:{value:1}, uN:{value:0}, uRP:{value:rp}, uRC:{value:rc}, uFog:{value:.1}, uBloom:{value:1} };
    this.mesh=new THREE.Mesh(g,new THREE.ShaderMaterial({
      uniforms:this.u,
      vertexShader:`${G_NOISE}
        uniform float uTime,uStr,uSpd,uWind; varying vec3 vW; varying float vH;
        void main(){ vec3 p=position; float tt=uTime*uSpd; float w=0.;
          w+=sin(p.x*.009+tt*1.25)*2.4; w+=sin(p.z*.012-tt*.95+uWind)*2.0;
          w+=(fbm(vec2(p.x*.004+tt*.06,p.z*.004))-.5)*9.; w*=uStr; p.y+=w; vH=w;
          vec4 wp=modelMatrix*vec4(p,1.); vW=wp.xyz; gl_Position=projectionMatrix*viewMatrix*wp; }`,
      fragmentShader:`${G_NOISE}
        precision highp float; varying vec3 vW; varying float vH;
        uniform float uTime,uMoonX,uMoonBr,uFog,uBloom;
        uniform int uN; uniform vec3 uRP[${RMAX}]; uniform vec3 uRC[${RMAX}];
        void main(){
          float depth=clamp((-vW.z+800.)/3200.,0.,1.);
          vec3 col=mix(vec3(.035,.075,.125),vec3(.008,.022,.05),depth);
          float mx=uMoonX*430.; float lane=exp(-pow((vW.x-mx)/110.,2.));
          float shim=.45+.55*fbm(vec2(vW.x*.02,vW.z*.008-uTime*1.2));
          col+=vec3(.78,.84,1.)*lane*shim*uMoonBr*.95;
          for(int i=0;i<${RMAX};i++){ if(i>=uN) break; vec3 rp=uRP[i];
            float dx=(vW.x-rp.x)/180.; float dz=(vW.z-rp.z)/520.;
            float gg=exp(-dx*dx)*exp(-dz*dz);
            float sh=.55+.45*fbm(vec2(vW.x*.04,vW.z*.015+uTime*1.8+float(i)*3.1));
            col+=uRC[i]*gg*sh*uBloom*.95; }
          col+=vec3(.13,.18,.25)*smoothstep(2.2,5.6,vH)*.45;
          float f=pow(clamp(-vW.z/2700.,0.,1.),1.4)*(.55+uFog);
          col=mix(col,vec3(.05,.075,.15),clamp(f,0.,.93));
          gl_FragColor=vec4(col,1.);}`
    }));
    this.mesh.position.set(0,0,-1000); app.scene.add(this.mesh);
  }
  update(dt,t){
    const w=WX[P.weather],u=this.u; u.uTime.value=t;
    u.uStr.value=P.waveStrength*w.wave; u.uSpd.value=P.waveSpeed*(.8+w.wind*.3);
    u.uWind.value=P.windDirection*P.windStrength*4;
    u.uMoonX.value=this.app.moon.screenX; u.uMoonBr.value=this.app.moon.mu.uBr.value;
    u.uFog.value=w.fog; u.uBloom.value=P.bloom;
  }
}

/* ============================================================================
   ShorelineSystem
   ============================================================================ */
class ShorelineSystem{
  constructor(app){
    this.app=app;
    this.sandU={ uTime:{value:0}, uWet:{value:.2}, uMoonBr:{value:1}, uMoonX:{value:0} };
    const sand=new THREE.Mesh(new THREE.PlaneGeometry(4600,460,2,2).rotateX(-Math.PI/2),new THREE.ShaderMaterial({
      uniforms:this.sandU,
      vertexShader:`varying vec3 vW; void main(){ vec4 wp=modelMatrix*vec4(position,1.); vW=wp.xyz;
        gl_Position=projectionMatrix*viewMatrix*wp;}`,
      fragmentShader:`${G_NOISE}
        varying vec3 vW; uniform float uTime,uWet,uMoonBr,uMoonX;
        void main(){ float n=fbm(vW.xz*.06); vec3 dry=vec3(.05,.05,.065)+n*.022;
          float nearSea=smoothstep(170.,40.,vW.z);
          vec3 wet=dry*.55+vec3(.02,.04,.07);
          float lane=exp(-pow((vW.x-uMoonX*430.)/150.,2.));
          wet+=vec3(.5,.6,.8)*lane*uWet*uMoonBr*nearSea*.35;
          vec3 col=mix(dry,wet,nearSea*clamp(uWet*2.,0.,1.));
          gl_FragColor=vec4(col,1.);}`
    }));
    sand.position.set(0,.1,210); app.scene.add(sand);

    this.sheets=[];
    for(let s=0;s<2;s++){
      const u={ uTime:{value:0}, uPhase:{value:s*Math.PI}, uStr:{value:1}, uProg:{value:0} };
      const m=new THREE.Mesh(new THREE.PlaneGeometry(4600,210,180,6).rotateX(-Math.PI/2),new THREE.ShaderMaterial({
        transparent:true, depthWrite:false, uniforms:u,
        vertexShader:`${G_NOISE}
          uniform float uTime,uPhase,uStr,uProg; varying vec2 vUv; varying float vFront;
          void main(){ vUv=uv; vec3 p=position; float curve=fbm(vec2(p.x*.012,uPhase))*38.;
            p.z+=uProg*64.*uStr - uv.y*10. + curve*uv.y; p.y+=.4+uv.y*.6; vFront=uv.y;
            gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);} `,
        fragmentShader:`${G_NOISE}
          varying vec2 vUv; varying float vFront; uniform float uTime,uStr,uProg;
          void main(){ float foam=smoothstep(.25,.95,vFront); float n=fbm(vUv*vec2(60.,14.)+uTime*.8);
            foam*=.35+.65*n; float fade=sin(clamp(uProg,0.,1.)*3.14159);
            float a=foam*fade*(.55+uStr*.25); gl_FragColor=vec4(vec3(.82,.93,1.),clamp(a,0.,.9));} `
      }));
      m.position.set(0,.5,-120); app.scene.add(m);   // ★遠方の水際ラインへ
      this.sheets.push({m,u,t:s*2.6});
    }
    this.period=5.2;
  }
  update(dt,t){
    const w=WX[P.weather], str=P.waveStrength*w.wave, spd=(.7+P.waveSpeed*.55)*(.85+w.wind*.15);
    this.sandU.uTime.value=t; this.sandU.uMoonBr.value=this.app.moon.mu.uBr.value; this.sandU.uMoonX.value=this.app.moon.screenX;
    const wet=(P.weather==='After Rain')?.8:(P.weather==='Rain'?.6:.25);
    this.sandU.uWet.value=lerp(this.sandU.uWet.value,wet,.03);
    let hit=0;
    for(const s of this.sheets){ s.t+=dt*spd; const ph=(s.t%this.period)/this.period;
      s.u.uTime.value=t; s.u.uStr.value=str; s.u.uProg.value=Math.sin(ph*Math.PI);
      hit=Math.max(hit,Math.pow(Math.max(0,Math.sin(ph*Math.PI*2-.4)),8)); }
    return hit*str;
  }
}

class NoctilucaSystem{
  constructor(app){

      ph[i]=Math.random()*TAU; sd[i]=Math.random();

      col[i*3]=c[0];col[i*3+1]=c[1];col[i*3+2]=c[2];

    this.u={ uTime:{value:0}, uHit:{value:0}, uBr:{value:1}, uDen:{value:1}, uPix:{value:Math.min(devicePixelRatio||1,2)} };

        varying float vA; varying vec3 vC;
        void main(){ float vis=step(1.-uDen,aS);
          float blink=.3+.7*pow(.5+.5*sin(uTime*2.6+aP*7.),4.);
          float wave=uHit*(.5+.5*sin(aP+uTime*5.));
          vA=clamp((blink*.45+wave*1.2)*uBr,0.,1.6)*vis; vC=aC;
          vec4 mv=modelViewMatrix*vec4(position,1.); gl_Position=projectionMatrix*mv;
          gl_PointSize=(1.8+wave*7.)*uPix*(300./max(-mv.z,1.)); }`,
      fragmentShader:`varying float vA; varying vec3 vC;
        void main(){ float a=smoothstep(.5,.0,length(gl_PointCoord-.5)); gl_FragColor=vec4(vC,a*vA);} `

      fragmentShader:`${G_NOISE}
        varying vec2 vUv; uniform float uTime,uHit,uBr,uOn;
        void main(){ float band=smoothstep(0.,.5,vUv.y)*smoothstep(1.,.5,vUv.y);
          float n=fbm(vUv*vec2(40.,6.)+vec2(uTime*.3,0.));

  }

        if(this.rainP[i*3+1]<0){ this.rainP[i*3]=rand(-1600,1600); this.rainP[i*3+1]=rand(900,1200); this.rainP[i*3+2]=rand(-1600,260);} }
      this.rain.geometry.attributes.position.needsUpdate=true; }
    const windX=P.windDirection*(P.windStrength+w.smoke*.4)*26; let d=0;
    for(let i=0;i<this.smokeN;i++){ if(!this.sActive[i]) continue; this.sl[i]-=dt;
      if(this.sl[i]<=0){ this.sActive[i]=0; this.sFree.push(i); continue; }
      this.sp[i*3]+=(this.sv[i*3]+windX)*dt; this.sp[i*3+1]+=this.sv[i*3+1]*dt; this.sp[i*3+2]+=this.sv[i*3+2]*dt;
      const lr=this.sl[i]/this.sm[i]; const ix=d*3;
      this.bP[ix]=this.sp[i*3]; this.bP[ix+1]=this.sp[i*3+1]; this.bP[ix+2]=this.sp[i*3+2];
      this.bA[d]=Math.sin(lr*Math.PI)*.16*(w.cloud*.5+.5); this.bS[d]=this.ssz[i]*(1.6-lr*.6); d++; }
    this.smoke.geometry.setDrawRange(0,d);
    const at=this.smoke.geometry.attributes; at.position.needsUpdate=true; at.aA.needsUpdate=true; at.aZ.needsUpdate=true;
  }
}

    this.u={ uPix:{value:Math.min(devicePixelRatio||1,2)}, uBloom:{value:1}, uPSize:{value:1.8} };
    this.pts=new THREE.Points(g,new THREE.ShaderMaterial({
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, uniforms:this.u,
      vertexShader:`
        attribute vec3 aC; attribute float aB; attribute float aZ;

  qs(){ return this.app.pScale; }
  alloc(x,y,z,vx,vy,vz,life,r,g,b,size,drag,grav,twk,em){

  launch(type,nx){

  explode(s){
    this.count++; const {x,y,z,hue}=s; const big=P.fwSize*PRG[P.program].big; const sp=44*big;
    /* 爆発音：種類ごとに音色を変える */

    const SND={ large:{size:1.95}, peony:{size:1.15}, chrys:{size:1.2}, willow:{size:1.35,soft:1},

      starmine:{size:0.7,crackle:1}, niagara:{size:1.1,soft:1}, heart:{size:1.0}, smile:{size:1.0},
      saturn:{size:1.15}, butterfly:{size:1.0}, fuji:{size:1.0} }[s.type] || {size:1.0};

    const pf=randi(1,3); for(let k=0;k<pf;k++) this.app.weather.puff(x,y,z);

  sphere(x,y,z,sp,n,hue,o){

      const v=sp*(.72+Math.random()*.46); const [r,g,b]=hsv(hue+rand(-.035,.035),.72,1);

    const sf=(o.strobe!==undefined)?o.strobe:0.10;       // ★中心付近に点滅星を混ぜる

  /* ストロボ星（キラキラ点滅）：低速で中心付近に留まり、白く鋭く明滅する */

        rand(1.6,2.8), 1,0.97,0.9, rand(2.6,4.0), 0.72, 20, 0, 0);

  willow(x,y,z,sp,n,silver,sparkle){
    n=(n*this.qs())|0;
    for(let i=0;i<n;i++){ const u=Math.random(),th=Math.random()*TAU,s=Math.sqrt(1-u*u); const v=sp*(.65+Math.random()*.45);
      let r,g,b,em; if(silver){ r=.86;g=.91;b=1; em=0; } else { const cc=hsv(.105+rand(-.018,.018),.88,1); r=cc[0];g=cc[1];b=cc[2]; em=1; }
      this.alloc(x,y,z,s*Math.cos(th)*v,(u*.85+.15)*v,s*Math.sin(th)*v, rand(3.6,5.2), r,g,b, rand(1.5,2.6), .22, 46, sparkle?.85:(silver?.55:.5), em); }

      this.alloc(fx,y+rand(-12,12),z, rand(-3,3),rand(-2,2),rand(-3,3), rand(2.8,4.2), cc[0],cc[1],cc[2], rand(2.4,3.6), .45, 68, .35, 1); }
  }
  shape2D(x,y,z,R,U,shape,sp,n,hue){
    n=(n*this.qs())|0;
    for(let i=0;i<n;i++){ const tt=i/n*TAU; let px,py;
      if(shape==='heart'){ px=Math.pow(Math.sin(tt),3); py=(13*Math.cos(tt)-5*Math.cos(2*tt)-2*Math.cos(3*tt)-Math.cos(4*tt))/16; }
      else if(shape==='smile'){

      else { const uu=i/n; px=(uu-.5)*2; py=-Math.abs(px)*.75+.55+(Math.abs(px)<.16?(.16-Math.abs(px))*1.1:0); }
      const dx=R.x*px+U.x*py+rand(-.04,.04), dy=R.y*px+U.y*py+rand(-.04,.04), dz=R.z*px+U.z*py;
      const v=sp*(.9+Math.random()*.18); const [r,g,b]=hsv((hue+(shape==='smile'?.12:0))%1, shape==='fuji'?.4:.78, 1);

  }
  saturn(x,y,z,R,U,sp,hue){

    for(let i=0;i<n;i++){ const a=i/n*TAU; const px=Math.cos(a),py=Math.sin(a)*tilt; const v=sp*1.35; const [r,g,b]=hsv((hue+.5)%1,.62,1);
      this.alloc(x,y,z,(R.x*px+U.x*py)*v,(R.y*px+U.y*py)*v,(R.z*px+U.z*py)*v, rand(1.6,2.2), r,g,b, rand(2.4,3.4), .88, 16, .3, 0); }
  }

  update(dt,t,finale){
    this.u.uBloom.value=P.bloom; this.u.uPSize.value=P.fwParticle;   // ★粒サイズ反映
    this.app.reflect.begin();
    const w=WX[P.weather], pr=PRG[P.program];
    this.autoT-=dt; const base=1/(pr.rate*P.fwIntensity);
    if(this.autoT<=0){ const k=finale?randi(3,5):1; for(let i=0;i<k;i++) this.launch(pick(pr.types)); this.autoT=(finale?base*.14:base)*rand(.7,1.3); }
    const wind=P.windDirection*(P.windStrength*.85+w.wind*.45)*15;

    for(let i=this.shells.length-1;i>=0;i--){ const s=this.shells[i]; s.age+=dt; s.vy-=58*dt*.046;
      s.x+=s.vx*dt*20; s.y+=s.vy*dt*20; s.z+=s.vz*dt*20;
      if(Math.random()<.7){ const cc=hsv(.08,.6,1);  // 上昇トレイル＝燃える火の粉
        this.alloc(s.x,s.y,s.z, rand(-2,2),rand(-3,0),rand(-2,2), rand(.3,.6), cc[0],cc[1],cc[2], rand(2.0,3.2), .6, 26, .4, 1); }
      if(s.age>=s.fuse||s.vy<=0||s.y>=s.ty){ this.explode(s); this.shells.splice(i,1); } }

    let d=0; const bp=this.bp,bc=this.bc,bb=this.bb,bs=this.bs, tmp=this._tmp;
    for(let i=0;i<this.M;i++){ if(!this.on[i]) continue;
      let l=this.lf[i]-dt; if(l<=0){ this.on[i]=0; this.free.push(i); continue; } this.lf[i]=l;
      const damp=1-this.dg[i]*dt;
      this.vx[i]=(this.vx[i]+wind*dt)*damp; this.vy[i]=(this.vy[i]-this.gv[i]*dt)*damp; this.vz[i]*=damp;
      this.px[i]+=this.vx[i]*dt; this.py[i]+=this.vy[i]*dt; this.pz[i]+=this.vz[i]*dt;
      const lr=l/this.ml[i];
      let br=lr*lr*(3-2*lr);                         // smoothstep フェード
      let r,g,b;
      if(this.st[i]>0){                              // ★キラキラ点滅（ストロボ星）：鋭く明滅する白
        const f=t*this.st[i]+i*0.618; const frac=f-(f|0);
        br*=(frac<0.16?1:0)*1.9;
        r=1; g=0.97; b=0.92;
      }else if(this.em[i]>0){                        // ★火薬の燃焼：黒体冷却＋パチパチ
        ember(lr,tmp); r=tmp[0]; g=tmp[1]; b=tmp[2];
        br*=0.55+0.45*Math.abs(Math.sin(t*38+i*1.7));
      }else{
        r=this.cr[i]; g=this.cg[i]; b=this.cb[i];
        if(this.tw[i]>0) br*=1-this.tw[i]*0.5+this.tw[i]*Math.abs(Math.sin(t*26+i)); // 軽い明滅
      }
      const ix=d*3; bp[ix]=this.px[i];bp[ix+1]=this.py[i];bp[ix+2]=this.pz[i];
      bc[ix]=r; bc[ix+1]=g; bc[ix+2]=b; bb[d]=br; bs[d]=this.sz[i]*(.55+lr*.55); d++;
    }
    this.pts.geometry.setDrawRange(0,d);
    const at=this.pts.geometry.attributes;
    at.position.needsUpdate=true; at.aC.needsUpdate=true; at.aB.needsUpdate=true; at.aZ.needsUpdate=true;
  }
}

/* ============================================================================
   ReflectionSystem
   ============================================================================ */
class ReflectionSystem{
  constructor(app){ this.app=app; this.slots=[]; }
  begin(){ for(let i=this.slots.length-1;i>=0;i--){ this.slots[i].life-=0.016; if(this.slots[i].life<=0) this.slots.splice(i,1);} }
  add(x,z,c){ if(this.slots.length>=RMAX) this.slots.shift(); this.slots.push({x,z,c,life:1.6}); }
  flush(){ const u=this.app.ocean.u; const n=Math.min(this.slots.length,RMAX); u.uN.value=n;
    for(let i=0;i<RMAX;i++){ if(i<n){ const s=this.slots[i],f=clamp(s.life/1.6,0,1);
      u.uRP.value[i].set(s.x,0,s.z); u.uRC.value[i].setRGB(s.c[0]*f,s.c[1]*f,s.c[2]*f);
    } else u.uRC.value[i].setRGB(0,0,0); } }
}

/* ============================================================================
   SoundSystem — Web Audioで花火音を合成（外部ファイル不要）
   - explosion: 低音サイン・スイープ + ローパスノイズの「ドーン」
   - 種類で音色変化（大玉=低く長い / スターマイン・千輪=パチパチ / 柳=柔らかい低音）
   - 距離に応じて僅かに遅延（光ってから音が届く情緒）
   ============================================================================ */
class SoundSystem{
  constructor(app){ this.app=app; this.ctx=null; this.enabled=!!P.sound; this.master=null; this.noise=null; }
  ensure(){
    if(this.ctx) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    this.ctx=new AC();
    this.comp=this.ctx.createDynamicsCompressor();   // 多重再生のクリップ抑制
    this.master=this.ctx.createGain(); this.master.gain.value=this.enabled?P.volume:0;
    this.master.connect(this.comp); this.comp.connect(this.ctx.destination);
    const len=(this.ctx.sampleRate*1.0)|0; const b=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    const d=b.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1; this.noise=b;
  }
  unlock(){ this.ensure(); if(this.ctx && this.ctx.state==='suspended') this.ctx.resume(); }   // ユーザー操作で解錠
  setEnabled(on){ this.enabled=on; this.ensure(); if(!this.ctx) return;
    if(on && this.ctx.state==='suspended') this.ctx.resume();
    const g=this.master.gain, t=this.ctx.currentTime;
    g.cancelScheduledValues(t); g.linearRampToValueAtTime(on?P.volume:0, t+0.12); }
  applyVolume(){ if(this.ctx && this.enabled){ const t=this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(t); this.master.gain.linearRampToValueAtTime(P.volume,t+0.05); } }

  boom(o){
    if(!this.enabled||!this.ctx) return; const ctx=this.ctx, now=ctx.currentTime;
    const size=clamp(o.size||1,0.5,2.2);
    const dist=o.dist||300; const t0=now+clamp(dist*0.0009,0,0.45);   // 距離ぶん遅れて届く
    const vol=clamp(0.55*size,0.12,1.0); const soft=o.soft?1:0;
    // 低音ボディ（サイン・スイープ）
    const osc=ctx.createOscillator(); osc.type='sine';
    const f0=lerp(150,80,clamp((size-0.6)/1.4,0,1))*rand(0.9,1.12);
    osc.frequency.setValueAtTime(f0,t0);
    osc.frequency.exponentialRampToValueAtTime(Math.max(f0*0.38,22),t0+0.34*size);
    const og=ctx.createGain(); og.gain.setValueAtTime(0.0001,t0);
    og.gain.exponentialRampToValueAtTime(vol,t0+0.008);
    og.gain.exponentialRampToValueAtTime(0.0008,t0+(0.5+soft*0.3)*size);
    osc.connect(og); og.connect(this.master); osc.start(t0); osc.stop(t0+(0.65+soft*0.3)*size+0.1);
    // パンチ＆残響（ノイズ→ローパス）
    const src=ctx.createBufferSource(); src.buffer=this.noise;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.setValueAtTime(soft?rand(300,600):rand(600,1200),t0);
    lp.frequency.exponentialRampToValueAtTime(110,t0+0.42*size);
    const ng=ctx.createGain(); ng.gain.setValueAtTime(0.0001,t0);
    ng.gain.exponentialRampToValueAtTime(vol*0.8,t0+0.006);
    ng.gain.exponentialRampToValueAtTime(0.0006,t0+0.5*size);
    src.connect(lp); lp.connect(ng); ng.connect(this.master); src.start(t0); src.stop(t0+0.7*size);
    // パチパチ（千輪・スターマイン）
    if(o.crackle){
      const n=randi(7,16);
      for(let k=0;k<n;k++){ const tt=t0+rand(0.04,0.55);
        const s2=ctx.createBufferSource(); s2.buffer=this.noise;
        const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=rand(2200,5200);
        const g2=ctx.createGain(); g2.gain.setValueAtTime(0.0001,tt);
        g2.gain.exponentialRampToValueAtTime(vol*0.22,tt+0.003);
        g2.gain.exponentialRampToValueAtTime(0.0005,tt+0.05);
        s2.connect(hp); hp.connect(g2); g2.connect(this.master); s2.start(tt); s2.stop(tt+0.06); }
    }
  }
  whistle(){
    if(!this.enabled||!this.ctx||!P.whistle) return; const ctx=this.ctx, now=ctx.currentTime;
    const osc=ctx.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(rand(420,680),now);
    osc.frequency.exponentialRampToValueAtTime(rand(950,1500),now+0.5);
    const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,now);
    g.gain.exponentialRampToValueAtTime(0.07,now+0.05);
    g.gain.exponentialRampToValueAtTime(0.0004,now+0.6);
    osc.connect(g); g.connect(this.master); osc.start(now); osc.stop(now+0.7);
  }
}

/* ============================================================================
   HUDSystem
   ============================================================================ */
class HUDSystem{
  constructor(app){ this.app=app;
    this.e={ w:hWeather, p:hProgram, c:hCount, b:hBar, f:hFinale, fps:hFps }; this.n=0;
  }
  update(){ if(++this.n%6) return; const fw=this.app.fw;
    this.e.w.textContent=P.weather; this.e.p.textContent=P.program;
    this.e.c.textContent=`${fw.count} / ${fw.GOAL}`; this.e.b.style.width=clamp(fw.count/fw.GOAL*100,0,100)+'%';
    if(this.app.finale){ this.e.f.textContent='NOW'; this.e.f.className='v finale-now'; }
    else { this.e.f.className='v'; this.e.f.textContent=P.autoFinale?Math.max(0,this.app.finaleIn).toFixed(0)+'s':'OFF'; }
    this.e.fps.textContent=this.app.fps.toFixed(0);
  }
}
